name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Black
        run: black --check backend scraper
      - name: Flake8
        run: flake8 backend scraper
      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install frontend dependencies
        run: npm install
      - name: Build frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t bearing-monitor-api --target backend .
      - name: Build worker image
        run: docker build -t bearing-monitor-worker --target worker .
      - name: Build scraper image
        run: docker build -t bearing-monitor-scraper --target scraper .
      - name: Build frontend image
        run: docker build -t bearing-monitor-frontend ./frontend
