global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: worker
    static_configs:
      - targets: ["worker:9102"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

