groups:
  - name: bearing-monitor
    rules:
      - alert: ApiHighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(bearing_monitor_http_request_latency_seconds_bucket[5m])) by (le, path)) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API latency is elevated
          description: FastAPI p95 latency has exceeded 1.5 seconds for 10 minutes.

      - alert: ScraperProxyFailures
        expr: increase(bearing_monitor_scraper_proxy_failures_total[15m]) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Proxy failures spiking
          description: The scraper observed more than 10 proxy failures in the last 15 minutes.

